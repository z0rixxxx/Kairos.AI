<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>⚡ Anime RPG Deluxe</title>
    <style>
        /* ========== GLOBAL RESET ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            overflow: hidden;
            background: #0a0a1a;
            font-family: 'Segoe UI', Arial, sans-serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ========== HUD (Top Left) ========== */
        #hud {
            position: absolute;
            top: 12px;
            left: 12px;
            pointer-events: none;
            z-index: 10;
        }
        .bar-wrap {
            width: 160px;
            height: 12px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            margin-bottom: 4px;
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            backdrop-filter: blur(4px);
        }
        .bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.1s ease;
        }
        #hp-fill {
            background: linear-gradient(90deg, #ff1a4a, #ff4d7a);
            box-shadow: 0 0 12px #ff1a4a88;
        }
        #stam-fill {
            background: linear-gradient(90deg, #00ccff, #66e5ff);
            box-shadow: 0 0 12px #00ccff88;
        }
        #energy-fill {
            background: linear-gradient(90deg, #cc44ff, #e880ff);
            box-shadow: 0 0 12px #cc44ff88;
        }
        .label {
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-shadow: 0 0 8px #000;
            display: flex;
            justify-content: space-between;
            padding: 0 4px;
        }
        #combo-display {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 26px;
            font-weight: 900;
            text-shadow: 0 0 30px #ff3366, 0 0 60px #ff336644;
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 2px;
        }
        #combo-display.active {
            opacity: 1;
        }
        #lockon-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffdd44;
            font-size: 28px;
            font-weight: 900;
            text-shadow: 0 0 30px #ffdd44;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.2s;
        }
        #lockon-indicator.active {
            opacity: 1;
        }

        /* ========== TOUCH CONTROLS ========== */
        #touch-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
        }
        #touch-layer>* {
            pointer-events: auto;
        }
        #joystick-area {
            position: absolute;
            bottom: 100px;
            left: 30px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(6px);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: radial-gradient(circle, #88ddff, #3399cc);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 25px #44aaff88;
        }
        #camera-drag {
            position: absolute;
            top: 0;
            right: 0;
            width: 55%;
            height: 100%;
            background: transparent;
        }
        #btn-group {
            position: absolute;
            bottom: 110px;
            right: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .btn-row {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            transition: transform 0.05s, background 0.05s;
        }
        .action-btn:active,
        .action-btn.pressed {
            transform: scale(0.85);
            background: rgba(255, 255, 255, 0.2);
        }
        #btn-attack {
            background: rgba(255, 50, 50, 0.5);
            border-color: #ff4444;
            font-size: 22px;
        }
        #btn-heavy {
            background: rgba(255, 150, 0, 0.5);
            border-color: #ff8800;
            font-size: 22px;
        }
        #btn-jump {
            background: rgba(50, 200, 255, 0.5);
            border-color: #44ddff;
        }
        #btn-dash {
            background: rgba(0, 255, 200, 0.4);
            border-color: #44ffcc;
        }
        #btn-ability {
            background: rgba(180, 50, 255, 0.5);
            border-color: #aa44ff;
            font-size: 16px;
        }
        #btn-lock {
            background: rgba(255, 200, 0, 0.4);
            border-color: #ffdd44;
            font-size: 14px;
            width: 44px;
            height: 44px;
        }
        #btn-parry {
            background: rgba(0, 200, 255, 0.4);
            border-color: #44ddff;
            font-size: 14px;
            width: 44px;
            height: 44px;
        }
        #btn-inv {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
            font-size: 14px;
            width: 44px;
            height: 44px;
        }
        .small-btn {
            width: 44px;
            height: 44px;
            font-size: 14px;
        }

        /* ========== UI PANELS ========== */
        .panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 30, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 24px;
            color: #fff;
            z-index: 30;
            min-width: 320px;
            max-height: 80vh;
            overflow-y: auto;
            display: none;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }
        .panel.active {
            display: block;
        }
        .panel h2 {
            text-align: center;
            margin-bottom: 16px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }
        .panel-close {
            position: absolute;
            top: 10px;
            right: 16px;
            font-size: 24px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.4);
            transition: color 0.2s;
            background: none;
            border: none;
        }
        .panel-close:hover {
            color: #fff;
        }
        .skill-node {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin: 6px 0;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            border-left: 3px solid #44aaff;
            transition: background 0.2s;
        }
        .skill-node.unlocked {
            border-left-color: #66ff88;
            background: rgba(100, 255, 136, 0.08);
        }
        .skill-node button {
            background: #44aaff;
            border: none;
            color: #fff;
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .skill-node button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .skill-node button:hover:not(:disabled) {
            background: #88ddff;
        }
        .inv-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            margin: 4px 0;
        }
        .inv-item button {
            background: #66dd88;
            border: none;
            color: #000;
            padding: 2px 14px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .quest-item {
            padding: 10px 12px;
            margin: 6px 0;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            border-left: 3px solid #ffaa44;
        }
        .quest-item.complete {
            border-left-color: #66ff88;
            opacity: 0.6;
        }
        .quest-item .progress {
            font-size: 12px;
            color: #aaa;
        }

        #controls-hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.15);
            font-size: 10px;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 12px;
            border-radius: 12px;
            white-space: nowrap;
        }
        @media (max-width: 768px) {
            #controls-hint {
                display: none;
            }
            #hud .bar-wrap {
                width: 110px;
                height: 10px;
            }
            #hud .label {
                font-size: 7px;
            }
            #joystick-area {
                width: 100px;
                height: 100px;
                bottom: 80px;
                left: 16px;
            }
            #joystick-knob {
                width: 36px;
                height: 36px;
            }
            .action-btn {
                width: 44px;
                height: 44px;
                font-size: 16px;
            }
            #btn-lock,
            #btn-parry,
            #btn-inv {
                width: 38px;
                height: 38px;
                font-size: 12px;
            }
            #btn-group {
                bottom: 90px;
                right: 8px;
                gap: 6px;
            }
            .btn-row {
                gap: 6px;
            }
            #combo-display {
                font-size: 18px;
                top: 60px;
            }
            .panel {
                min-width: 280px;
                padding: 16px;
            }
        }
        @media (pointer: coarse) {
            #controls-hint {
                display: none;
            }
        }
        @media (pointer: fine) {
            #touch-layer {
                display: none;
            }
        }
        /* scrollbar */
        .panel::-webkit-scrollbar {
            width: 4px;
        }
        .panel::-webkit-scrollbar-thumb {
            background: #44aaff;
            border-radius: 4px;
        }
        .panel::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>
<body>

    <!-- ===== HUD ===== -->
    <div id="hud">
        <div class="label"><span>❤️</span><span id="hp-text">100</span></div>
        <div class="bar-wrap"><div class="bar-fill" id="hp-fill" style="width:100%"></div></div>
        <div class="label"><span>⚡</span><span id="stam-text">100</span></div>
        <div class="bar-wrap"><div class="bar-fill" id="stam-fill" style="width:100%"></div></div>
        <div class="label"><span>🌀</span><span id="energy-text">50</span></div>
        <div class="bar-wrap"><div class="bar-fill" id="energy-fill" style="width:100%"></div></div>
    </div>
    <div id="combo-display">⚔️ 2x COMBO</div>
    <div id="lockon-indicator">◉ LOCK-ON</div>
    <div id="controls-hint">🖱️ Click to lock · WASD · LMB/RMB · Shift · Space · Q · E · F · Tab</div>

    <!-- ===== TOUCH LAYER ===== -->
    <div id="touch-layer">
        <div id="joystick-area"><div id="joystick-knob"></div></div>
        <div id="camera-drag"></div>
        <div id="btn-group">
            <div class="btn-row">
                <button class="action-btn small-btn" id="btn-dash">💨</button>
                <button class="action-btn small-btn" id="btn-jump">⬆</button>
                <button class="action-btn small-btn" id="btn-lock">🎯</button>
                <button class="action-btn small-btn" id="btn-parry">🛡️</button>
                <button class="action-btn small-btn" id="btn-inv">📦</button>
            </div>
            <div class="btn-row">
                <button class="action-btn" id="btn-attack">⚔️</button>
                <button class="action-btn" id="btn-heavy">💥</button>
                <button class="action-btn" id="btn-ability">🌀</button>
            </div>
        </div>
    </div>

    <!-- ===== PANELS ===== -->
    <div class="panel" id="skill-panel">
        <button class="panel-close" data-panel="skill-panel">✕</button>
        <h2>🌀 Skill Tree</h2>
        <div id="skill-tree-container"></div>
        <div style="margin-top:12px;text-align:center;font-size:12px;color:#888;">Skill Points: <span id="skill-points">0</span></div>
    </div>

    <div class="panel" id="inv-panel">
        <button class="panel-close" data-panel="inv-panel">✕</button>
        <h2>📦 Inventory</h2>
        <div id="inv-container"></div>
    </div>

    <div class="panel" id="quest-panel">
        <button class="panel-close" data-panel="quest-panel">✕</button>
        <h2>📜 Quests</h2>
        <div id="quest-container"></div>
    </div>

    <!-- ===== THREE.JS ===== -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // =======================================================================
        //  IMPORTS
        // =======================================================================
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // =======================================================================
        //  CONFIG
        // =======================================================================
        const CONFIG = {
            walkSpeed: 4.0,
            sprintSpeed: 7.0,
            jumpForce: 7.0,
            gravity: -22,
            maxJumps: 2,
            dashSpeed: 16,
            dashDuration: 0.25,
            lightAttackDuration: 0.35,
            heavyAttackDuration: 0.55,
            abilityCooldown: 2.5,
            staminaRegen: 10,
            energyRegen: 2,
            maxStamina: 100,
            maxHealth: 100,
            maxEnergy: 60,
        };

        // =======================================================================
        //  SCENE SETUP
        // =======================================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2b4a);
        scene.fog = new THREE.Fog(0x1a2b4a, 45, 90);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 6, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.prepend(renderer.domElement);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.3, 0.4, 0.85);
        composer.addPass(bloom);

        // =======================================================================
        //  LIGHTING
        // =======================================================================
        const ambient = new THREE.AmbientLight(0x446688, 0.4);
        scene.add(ambient);
        const hemi = new THREE.HemisphereLight(0x88ccff, 0x442233, 0.6);
        scene.add(hemi);
        const sun = new THREE.DirectionalLight(0xffeedd, 2.5);
        sun.position.set(30, 40, 20);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.near = 0.1;
        sun.shadow.camera.far = 80;
        sun.shadow.camera.left = -40;
        sun.shadow.camera.right = 40;
        sun.shadow.camera.top = 40;
        sun.shadow.camera.bottom = -40;
        scene.add(sun);
        const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
        fill.position.set(-20, 10, -20);
        scene.add(fill);

        // =======================================================================
        //  WORLD
        // =======================================================================
        // Ground
        const groundGeo = new THREE.PlaneGeometry(160, 160, 160, 160);
        groundGeo.rotateX(-Math.PI / 2);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a6a4a, roughness: 0.8, metalness: 0 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid
        const grid = new THREE.GridHelper(160, 50, 0x88ddff, 0x44aaff);
        grid.position.y = 0.05;
        grid.material.transparent = true;
        grid.material.opacity = 0.12;
        scene.add(grid);

        // Trees
        function makeTree(x, z) {
            const g = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.35, 1.8),
                new THREE.MeshStandardMaterial({ color: 0x8b6b4a, roughness: 0.9 }));
            trunk.position.y = 0.9;
            trunk.castShadow = true;
            g.add(trunk);
            const crown = new THREE.Mesh(new THREE.SphereGeometry(0.8 + Math.random() * 0.4, 6, 6),
                new THREE.MeshStandardMaterial({ color: 0x3bb86a, roughness: 0.6, emissive: 0x1a4a2a,
                    emissiveIntensity: 0.05 }));
            crown.position.y = 2.0 + Math.random() * 0.5;
            crown.castShadow = true;
            g.add(crown);
            g.position.set(x, 0, z);
            g.rotation.y = Math.random() * Math.PI * 2;
            g.scale.setScalar(0.7 + Math.random() * 0.6);
            return g;
        }
        for (let i = 0; i < 200; i++) {
            const a = Math.random() * Math.PI * 2,
                r = 8 + Math.random() * 65;
            const x = Math.cos(a) * r,
                z = Math.sin(a) * r;
            if (Math.abs(x) < 8 && Math.abs(z) < 8) continue;
            scene.add(makeTree(x, z));
        }

        // Houses
        function makeHouse(x, z, color = 0xffccaa) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.2, 1.8),
                new THREE.MeshStandardMaterial({ color, roughness: 0.6, emissive: color, emissiveIntensity: 0.05 }));
            body.position.y = 0.6;
            body.castShadow = true;
            g.add(body);
            const roof = new THREE.Mesh(new THREE.ConeGeometry(1.4, 0.9, 4),
                new THREE.MeshStandardMaterial({ color: 0xcc5533, roughness: 0.7, emissive: 0x441111,
                    emissiveIntensity: 0.1 }));
            roof.position.y = 1.5;
            roof.rotation.y = Math.PI / 4;
            roof.castShadow = true;
            g.add(roof);
            g.position.set(x, 0, z);
            g.rotation.y = Math.random() * Math.PI * 2;
            return g;
        }
        const village = [
            [-14, -12],
            [-16, -6],
            [-10, -14],
            [-20, -14],
            [-12, -4],
            [-22, -8],
            [-8, -8]
        ];
        village.forEach(p => scene.add(makeHouse(p[0], p[1], 0xffddaa)));

        // Mountains
        function makeMountain(x, z, scale) {
            const m = new THREE.Mesh(new THREE.DodecahedronGeometry(2.8, 1),
                new THREE.MeshStandardMaterial({ color: 0x6a7a8a, roughness: 0.9, flatShading: true }));
            m.position.set(x, 0.5, z);
            m.scale.set(scale, scale * 0.6 + 0.6, scale);
            m.castShadow = true;
            m.receiveShadow = true;
            scene.add(m);
        }
        const mtns = [
            [-40, -30, 5],
            [-45, -20, 4],
            [35, 35, 6],
            [40, 25, 3.5],
            [30, -40, 5],
            [-30, 40, 4.5]
        ];
        mtns.forEach(m => makeMountain(m[0], m[1], m[2]));

        // Rocks
        for (let i = 0; i < 50; i++) {
            const a = Math.random() * Math.PI * 2,
                r = 15 + Math.random() * 50;
            const rock = new THREE.Mesh(new THREE.SphereGeometry(0.3 + Math.random() * 0.8, 5),
                new THREE.MeshStandardMaterial({ color: 0x6a7a7a, roughness: 0.9 }));
            rock.position.set(Math.cos(a) * r, 0.2 + Math.random() * 0.5, Math.sin(a) * r);
            rock.castShadow = true;
            scene.add(rock);
        }

        // =======================================================================
        //  PLAYER
        // =======================================================================
        const playerGroup = new THREE.Group();
        playerGroup.position.set(0, 1, 0);

        // Body
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 0.8, 8, 8),
            new THREE.MeshStandardMaterial({ color: 0x44aaff, roughness: 0.2, metalness: 0.1, emissive: 0x1144aa,
                emissiveIntensity: 0.1 }));
        body.position.y = 0.9;
        body.castShadow = true;
        playerGroup.add(body);

        // Head
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 12, 12),
            new THREE.MeshStandardMaterial({ color: 0xffddbb, roughness: 0.3 }));
        head.position.y = 1.6;
        head.castShadow = true;
        playerGroup.add(head);

        // Hair
        const hair = new THREE.Mesh(new THREE.ConeGeometry(0.45, 0.4, 6),
            new THREE.MeshStandardMaterial({ color: 0x222244, roughness: 0.8, emissive: 0x111133,
                emissiveIntensity: 0.2 }));
        hair.position.y = 1.9;
        hair.rotation.y = Math.PI / 6;
        playerGroup.add(hair);

        // Eyes
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x00ddff, emissive: 0x00ddff, emissiveIntensity: 0.5 });
        const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6), eyeMat);
        eyeL.position.set(-0.15, 1.7, 0.35);
        playerGroup.add(eyeL);
        const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6), eyeMat);
        eyeR.position.set(0.15, 1.7, 0.35);
        playerGroup.add(eyeR);

        // Sword
        const blade = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.7, 0.02),
            new THREE.MeshStandardMaterial({ color: 0x88ddff, emissive: 0x44aaff, emissiveIntensity: 0.3, metalness: 0.9,

        function playTone(freq, duration, type = 'sine', vol = 0.15) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        function sfxHit() { playTone(800, 0.08, 'sawtooth', 0.1); }

            jTouchId = t.identifier;
            updateJoystick(t.clientX, t.clientY); }, { passive: false });
        jArea.addEventListener('touchmove', e => { e.preventDefault(); for (let t of e.changedTouches) { if (t.identifier ===
                    jTouchId) updateJoystick(t.clientX, t.clientY); } }, { passive: false });
        jArea.addEventListener('touchend', e => { e.preventDefault(); for (let t of e.changedTouches) { if (t.identifier ===
                    jTouchId) { jTouchId = null;
                    touch.moveX = 0;
                    touch.moveY = 0;
                    jKnob.style.transform = 'translate(-50%, -50%)'; } } }, { passive: false });
        jArea.addEventListener('touchcancel', () => { jTouchId = null;
            touch.moveX = 0;
            touch.moveY = 0;
            jKnob.style.transform = 'translate(-50%, -50%)'; }, { passive: false });

        function updateJoystick(cx, cy) {
            const rect = jArea.getBoundingClientRect();
            const dx = cx - (rect.left + rect.width / 2),
                dy = cy - (rect.top + rect.height / 2);
            const maxD = rect.width / 2 - 8;
            let dist = Math.sqrt(dx * dx + dy * dy);
            let angle = Math.atan2(dy, dx);
            let clamped = Math.min(dist, maxD);
            if (dist < 5) { touch.moveX = 0;
                touch.moveY = 0;
                jKnob.style.transform = 'translate(-50%, -50%)'; return; }
            const norm = clamped / maxD;
            const dead = 0.15;
            let final = Math.max(0, (norm - dead) / (1 - dead));
            touch.moveX = Math.cos(angle) * final;
            touch.moveY = Math.sin(angle) * final;
            jKnob.style.transform = `translate(calc(-50% + ${Math.cos(angle)*clamped}px), calc(-50% + ${Math.sin(angle)*clamped}px))`;
        }

        // =======================================================================
        //  SAVE / LOAD
        // =======================================================================
        function saveGame() {
            const data = {
                health,
                stamina,
                energy,
                skillPoints,
                inventory,
                quests: activeQuests.map(q => ({ id: q.id, progress: q.progress, complete: q.complete })),
                skillTree: skillTree.map(s => ({ id: s.id, unlocked: s.unlocked })),
                playerPos: playerGroup.position.toArray(),
            };
            localStorage.setItem('animeRPG_save', JSON.stringify(data));
        }

        function loadGame() {
            const raw = localStorage.getItem('animeRPG_save');
            if (!raw) return false;
            try {
                const data = JSON.parse(raw);
                health = data.health || CONFIG.maxHealth;
                stamina = data.stamina || CONFIG.maxStamina;
                energy = data.energy || CONFIG.maxEnergy;
                skillPoints = data.skillPoints || 0;
                if (data.inventory) {
                    inventory.potion = data.inventory.potion || 0;
                    inventory.energyPotion = data.inventory.energyPotion || 0;
                }
                if (data.quests) {
                    data.quests.forEach(savedQ => {
                        const q = quests.find(q => q.id === savedQ.id);
                        if (q) {
                            q.progress = savedQ.progress || 0;
                            q.complete = savedQ.complete || false;
                            if (!activeQuests.includes(q)) activeQuests.push(q);
                        }
                    });
                }
                if (data.skillTree) {
                    data.skillTree.forEach(s => {
                        const skill = skillTree.find(sk => sk.id === s.id);
                        if (skill && s.unlocked) {
                            skill.unlocked = true;
                            skill.effect();
                        }
                    });
                }
                if (data.playerPos) {
                    playerGroup.position.set(data.playerPos[0], data.playerPos[1], data.playerPos[2]);
                }
                renderUI();
                return true;
            } catch (e) { return false; }
        }

        // =======================================================================

        // =======================================================================
        const clock = new THREE.Clock();
        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05);
            time += dt;

            // ---- Weather ----
            const weatherPhase = Math.sin(time * 0.005) * 0.5 + 0.5;
            const rainIntensity = Math.max(0, Math.sin(time * 0.003 + 0.5) * 0.8);
            // (visual rain particles could be added, but keep it simple)

            // ---- Day/Night ----
            const sunAngle = time * 0.02;
            sun.position.set(Math.cos(sunAngle) * 45, 25 + Math.sin(sunAngle) * 20, Math.sin(sunAngle) * 45);
            const bright = Math.max(0.3, Math.sin(sunAngle) * 0.5 + 0.5);
            sun.intensity = 0.5 + bright * 2.0;
            scene.background.setHSL(0.6, 0.4, 0.05 + bright * 0.15);
            scene.fog.color.copy(scene.background);

            // ---- Player Input ----
            const move = { x: 0, y: 0 };
            if (keys['w'] || keys['arrowup']) move.y += 1;
            if (keys['s'] || keys['arrowdown']) move.y -= 1;
            if (keys['a'] || keys['arrowleft']) move.x -= 1;
            if (keys['d'] || keys['arrowright']) move.x += 1;
            const len = Math.sqrt(move.x * move.x + move.y * move.y);
            if (len > 1) { move.x /= len;
                move.y /= len; }
            if (Math.abs(touch.moveX) > 0.05 || Math.abs(touch.moveY) > 0.05) {
                move.x = touch.moveX;
                move.y = touch.moveY;
            }
            const sprint = keys['shift'] || false;
            const jump = (keys[' '] || touch.jump) && (() => { if (keys[' ']) keys[' '] = false; if (touch.jump) touch
                    .jump = false; return true; })();
            const dash = (keys['q'] || touch.dash) && (() => { if (keys['q']) keys['q'] = false; if (touch.dash) touch
                    .dash = false; return true; })();
            const lightAtk = (mouseDown.left || touch.attack) && (() => { if (touch.attack) touch.attack = false; return true;
                })();
            const heavyAtk = (mouseDown.right || touch.heavy) && (() => { if (touch.heavy) touch.heavy = false; return true;
                })();
            const ability = (keys['f'] || touch.ability) && (() => { if (keys['f']) keys['f'] = false; if (touch.ability)
                    touch.ability = false; return true; })();
            const lockon = (keys['e'] || touch.lockon) && (() => { if (keys['e']) keys['e'] = false; if (touch.lockon) touch
                    .lockon = false; return true; })();
            const parry = (keys['r'] || touch.parry) && (() => { if (keys['r']) keys['r'] = false; if (touch.parry) touch
                    .parry = false; return true; })();
            const invToggle = (keys['i'] || touch.inv) && (() => { if (keys['i']) keys['i'] = false; if (touch.inv) touch
                    .inv = false; return true; })();

            if (invToggle) togglePanel('inv-panel');

            // ---- Movement ----
            const forward = new THREE.Vector3(-Math.sin(camTheta), 0, -Math.cos(camTheta));
            const right = new THREE.Vector3(Math.cos(camTheta), 0, -Math.sin(camTheta));
            const moveDir = new THREE.Vector3();
            if (move.x !== 0 || move.y !== 0) {
                moveDir.add(forward.clone().multiplyScalar(move.y));
                moveDir.add(right.clone().multiplyScalar(move.x));
                if (moveDir.length() > 0) moveDir.normalize();
            }
            const speed = (sprint && stamina > 0) ? CONFIG.sprintSpeed : CONFIG.walkSpeed;
            if (sprint) stamina -= 12 * dt;
            if (!sprint && !dashing) stamina += CONFIG.staminaRegen * dt;
            stamina = Math.max(0, Math.min(CONFIG.maxStamina, stamina));

            if (!attacking && !dashing) {
                const amt = moveDir.clone().multiplyScalar(speed * dt);
                playerGroup.position.add(amt);
                if (moveDir.length() > 0.1) {
                    const targetRot = Math.atan2(moveDir.x, moveDir.z);
                    let diff = targetRot - playerGroup.rotation.y;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    playerGroup.rotation.y += diff * Math.min(1, 10 * dt);
                }
            }

            // Jump
            pVel.y += CONFIG.gravity * dt;
            if (playerGroup.position.y <= 1.0 && pVel.y < 0) {
                pVel.y = 0;
                grounded = true;
                jumpCount = 0;
            } else { grounded = false; }
            if (jump && (grounded || jumpCount < CONFIG.maxJumps) && stamina > 5) {
                pVel.y = CONFIG.jumpForce;
                jumpCount++;
                stamina -= 5;
                spawnHit(playerGroup.position.clone().add(new THREE.Vector3(0, 0.5, 0)), 0x88ddff, 10);
                sfxDash();
            }
            playerGroup.position.y += pVel.y * dt;

            // Dash
            if (dash && !dashing && stamina >= 20) {
                dashing = true;
                dashTimer = CONFIG.dashDuration;
                stamina -= 20;
                const dd = moveDir.length() > 0.1 ? moveDir : new THREE.Vector3(-Math.sin(camTheta), 0, -Math.cos(
                camTheta));
                spawnDashTrail(playerGroup.position);
                sfxDash();
            }
            if (dashing) {
                dashTimer -= dt;
                const dd = moveDir.length() > 0.1 ? moveDir : new THREE.Vector3(-Math.sin(camTheta), 0, -Math.cos(
                camTheta));
                playerGroup.position.add(dd.clone().multiplyScalar(CONFIG.dashSpeed * dt));
                if (dashTimer <= 0) dashing = false;
            }

            // ---- Combat ----
            if (abilityCooldown > 0) abilityCooldown -= dt;
            if (parry && !attacking && !dashing && stamina >= 10) {
                parrying = true;
                parryTimer = 0.25;
                stamina -= 10;
                sfxParry();
                spawnHit(playerGroup.position.clone().add(new THREE.Vector3(0, 1, 0)), 0x88ddff, 30);
                // Parry reflects melee attacks in a small window
                setTimeout(() => { parrying = false; }, 250);
            }

            // Light attack
            if (lightAtk && !attacking && !dashing && stamina >= 5) {
                attacking = true;
                isHeavy = false;
                attackTimer = CONFIG.lightAttackDuration;
                stamina -= 5;
                combo++;
                if (comboTimeout) clearTimeout(comboTimeout);
                comboTimeout = setTimeout(() => { combo = 0; }, 1500);
                const origin = playerGroup.position.clone().add(new THREE.Vector3(0, 0.8, 0));
                const dir = new THREE.Vector3(-Math.sin(camTheta), 0, -Math.cos(camTheta));
                const hitPos = origin.clone().add(dir.clone().multiplyScalar(2.5));
                spawnHit(hitPos, 0x44ddff, 25);
                sfxHit();
                enemies.forEach(e => {
                    if (e.isDead) return;
                    const dist = e.mesh.position.distanceTo(playerGroup.position);
                    if (dist < 3.0) {
                        const angle = Math.atan2(e.mesh.position.x - playerGroup.position.x, e.mesh.position.z -
                            playerGroup.position.z);
                        const playerAngle = Math.atan2(-Math.sin(camTheta), -Math.cos(camTheta));
                        let diff = angle - playerAngle;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        if (Math.abs(diff) < 1.2) {
                            const dmg = (12 + Math.random() * 6) * playerAttackMult;
                            e.health -= dmg;
                            e.hitFlash = 0.2;
                            spawnHit(e.mesh.position.clone().add(new THREE.Vector3(0, 1, 0)), 0xff8844, 30);
                            spawnDamageNumber(e.mesh.position, dmg);
                            if (e.health <= 0) {
                                e.isDead = true;
                                e.deathTimer = 2;
                                spawnHit(e.mesh.position, 0xff2244, 50);
                                sfxDeath();
                                // Quest progress
                                activeQuests.forEach(q => { if (q.id === 'q1') { q.progress = Math.min(q.target, q
                                            .progress + 1); if (q.progress >= q.target && !q.complete) { q
                                            .complete = true;
                                            q.reward(); } } if (q.id === 'q3' && e.isBoss) { q.progress = 1;
                                        q.complete = true;
                                        q.reward(); } });
                                // Loot
                                if (Math.random() < 0.4) { inventory.potion++;
                                    sfxHeal(); }
                                if (Math.random() < 0.2) { inventory.energyPotion++;
                                    sfxHeal(); }
                                saveGame();
                            }
                        }
                    }
                });
            }

            // Heavy attack
            if (heavyAtk && !attacking && !dashing && stamina >= 15) {
                attacking = true;
                isHeavy = true;
                attackTimer = CONFIG.heavyAttackDuration;
                stamina -= 15;
                combo = 0;
                const origin = playerGroup.position.clone().add(new THREE.Vector3(0, 0.5, 0));
                spawnHit(origin, 0xff6633, 60);
                sfxHit();
                enemies.forEach(e => {
                    if (e.isDead) return;
                    const dist = e.mesh.position.distanceTo(playerGroup.position);
                    if (dist < 4.0) {
                        const dmg = (25 + Math.random() * 10) * playerAttackMult;
                        e.health -= dmg;
                        e.hitFlash = 0.4;
                        spawnHit(e.mesh.position.clone().add(new THREE.Vector3(0, 1, 0)), 0xff4422, 40);
                        spawnDamageNumber(e.mesh.position, dmg);
                        if (e.health <= 0) {
                            e.isDead = true;
                            e.deathTimer = 2;
                            spawnHit(e.mesh.position, 0xff2244, 50);
                            sfxDeath();
                            activeQuests.forEach(q => { if (q.id === 'q1') { q.progress = Math.min(q.target, q
                                        .progress + 1); if (q.progress >= q.target && !q.complete) { q
                                        .complete = true;
                                        q.reward(); } } if (q.id === 'q3' && e.isBoss) { q.progress = 1;
                                    q.complete = true;
                                    q.reward(); } });
                            if (Math.random() < 0.4) { inventory.potion++;
                                sfxHeal(); }
                            if (Math.random() < 0.2) { inventory.energyPotion++;
                                sfxHeal(); }
                            saveGame();
                        }
                    }
                });
            }
            if (attacking) {
                attackTimer -= dt;
                if (attackTimer <= 0) attacking = false;
            }

            // Ability
            if (ability && abilityCooldown <= 0 && energy >= 20) {
                abilityCooldown = CONFIG.abilityCooldown;
                energy -= 20;
                const dir = new THREE.Vector3(-Math.sin(camTheta), 0, -Math.cos(camTheta));
                const origin = playerGroup.position.clone().add(new THREE.Vector3(0, 1.2, 0));
                spawnHit(origin.clone().add(dir.clone().multiplyScalar(3)), 0xaa66ff, 80);
                sfxAbility();
                enemies.forEach(e => {
                    if (e.isDead) return;
                    const dist = e.mesh.position.distanceTo(playerGroup.position);
                    if (dist < 8) {
                        const angle = Math.atan2(e.mesh.position.x - playerGroup.position.x, e.mesh.position.z -
                            playerGroup.position.z);
                        const playerAngle = Math.atan2(-Math.sin(camTheta), -Math.cos(camTheta));
                        let diff = angle - playerAngle;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        if (Math.abs(diff) < 1.8) {
                            const dmg = 35 * abilityDamageMult;
                            e.health -= dmg;
                            e.hitFlash = 0.3;
                            spawnHit(e.mesh.position.clone().add(new THREE.Vector3(0, 1, 0)), 0xaa44ff, 50);
                            spawnDamageNumber(e.mesh.position, dmg, '#aa88ff');
                            if (e.health <= 0) {
                                e.isDead = true;
                                e.deathTimer = 2;
                                spawnHit(e.mesh.position, 0xff2244, 50);
                                sfxDeath();
                                activeQuests.forEach(q => { if (q.id === 'q1') { q.progress = Math.min(q.target,
                                            q.progress + 1); if (q.progress >= q.target && !q.complete) { q
                                            .complete = true;
                                            q.reward(); } } if (q.id === 'q3' && e.isBoss) { q.progress = 1;
                                        q.complete = true;
                                        q.reward(); } });
                                if (Math.random() < 0.4) { inventory.potion++;
                                    sfxHeal(); }
                                if (Math.random() < 0.2) { inventory.energyPotion++;
                                    sfxHeal(); }
                                saveGame();
                            }
                        }
                    }
                });
            }

            // Energy regen
            if (energy < CONFIG.maxEnergy) energy += CONFIG.energyRegen * dt;

            // ---- Lock-on ----
            if (lockon) {
                if (!locked) {
                    let closest = Infinity,
                        ce = null;
                    enemies.forEach(e => {
                        if (e.isDead) return;
                        const d = e.mesh.position.distanceTo(playerGroup.position);
                        if (d < 25 && d < closest) { closest = d;
                            ce = e; }
                    });
                    if (ce) { locked = true;
                        lockOnTarget = ce; }
                } else { locked = false;
                    lockOnTarget = null; }
            }
            if (locked && lockOnTarget) {
                if (lockOnTarget.isDead || lockOnTarget.mesh.position.distanceTo(playerGroup.position) > 30) {
                    locked = false;
                    lockOnTarget = null;
                } else {
                    const dir = new THREE.Vector3(
                        lockOnTarget.mesh.position.x - playerGroup.position.x,
                        0,
                        lockOnTarget.mesh.position.z - playerGroup.position.z
                    );
                    if (dir.length() > 0.1) {
                        const targetRot = Math.atan2(dir.x, dir.z);
                        let diff = targetRot - playerGroup.rotation.y;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        playerGroup.rotation.y += diff * Math.min(1, 8 * dt);
                    }
                }
            }

            // ---- Enemy AI ----
            enemies.forEach(e => {
                if (e.isDead) {
                    e.deathTimer -= dt;
                    if (e.deathTimer <= 0) e.mesh.visible = false;
                    return;
                }
                if (e.hitFlash > 0) e.hitFlash -= dt;
                const dist = e.mesh.position.distanceTo(playerGroup.position);
                let state = 'idle';

                if (dist < e.aggroRange) {
                    state = 'chase';
                    const dir = new THREE.Vector3().copy(playerGroup.position).sub(e.mesh.position);
                    dir.y = 0;
                    if (dir.length() > 0.5) {
                        dir.normalize();
                        e.mesh.position.add(dir.clone().multiplyScalar(e.speed * dt));
                    }
                    e.mesh.rotation.y = Math.atan2(dir.x, dir.z);

                    // Ranged attack
                    if (e.isRanged && dist < e.attackRange && e.attackCooldown <= 0) {
                        e.attackCooldown = 1.5;
                        // Projectile (simulated with hit effect)
                        spawnHit(e.mesh.position.clone().add(new THREE.Vector3(0, 1, 0)), 0x44ff88, 15);
                        if (dist < 10 && !dashing && !parrying) {
                            health -= e.damage * 0.4;
                            spawnHit(playerGroup.position.clone().add(new THREE.Vector3(0, 1, 0)), 0xff2244, 15);
                            spawnDamageNumber(playerGroup.position, e.damage * 0.4, '#ff8888');
                            if (health <= 0) {
                                health = 0;
                                setTimeout(() => { health = CONFIG.maxHealth;
                                    stamina = CONFIG.maxStamina;
                                    energy = CONFIG.maxEnergy;
                                    playerGroup.position.set(0, 1, 0);
                                    pVel.set(0, 0, 0);
                                    saveGame(); }, 1000);
                            }
                        }
                    }
                    // Melee attack
                    if (!e.isRanged && dist < e.attackRange && e.attackCooldown <= 0) {
                        e.attackCooldown = 1.2;
                        if (!dashing && !parrying) {
                            health -= e.damage * 0.5;
                            spawnHit(playerGroup.position.clone().add(new THREE.Vector3(0, 1, 0)), 0xff2244, 20);
                            spawnDamageNumber(playerGroup.position, e.damage * 0.5, '#ff4444');
                            if (health <= 0) {
                                health = 0;
                                setTimeout(() => { health = CONFIG.maxHealth;
                                    stamina = CONFIG.maxStamina;
                                    energy = CONFIG.maxEnergy;
                                    playerGroup.position.set(0, 1, 0);
                                    pVel.set(0, 0, 0);
                                    saveGame(); }, 1000);
                            }
                        } else if (parrying) {
                            // Parry reflection: damage enemy
                            e.health -= 20;
                            e.hitFlash = 0.3;
                            spawnHit(e.mesh.position.clone().add(new THREE.Vector3(0, 1, 0)), 0x88ddff, 30);
                            spawnDamageNumber(e.mesh.position, 20, '#88ddff');
                            if (e.health <= 0) {
                                e.isDead = true;
                                e.deathTimer = 2;
                                spawnHit(e.mesh.position, 0xff2244, 50);
                                sfxDeath();
                                activeQuests.forEach(q => { if (q.id === 'q1') { q.progress = Math.min(q.target,
                                            q.progress + 1); if (q.progress >= q.target && !q.complete) { q
                                            .complete = true;
                                            q.reward(); } } if (q.id === 'q3' && e.isBoss) { q.progress = 1;
                                        q.complete = true;
                                        q.reward(); } });
                                if (Math.random() < 0.4) { inventory.potion++;
                                    sfxHeal(); }
                                if (Math.random() < 0.2) { inventory.energyPotion++;
                                    sfxHeal(); }
                                saveGame();
                            }
                        }
                    }
                    // Boss phase 2
                    if (e.isBoss && e.health < e.maxHealth * 0.4 && e.phase === 1) {
                        e.phase = 2;
                        e.speed *= 1.5;
                        e.damage *= 1.3;
                        e.mesh.children.forEach(child => {
                            if (child.isMesh && child.material) {
                                child.material.emissiveIntensity = 1.0;
                                child.material.color.setHex(0xff2222);
                            }
                        });
                        spawnHit(e.mesh.position, 0xff0000, 100);
                        sfxDeath();
                    }
                } else {
                    // Idle wander
                    e.mesh.rotation.y += dt * 0.3;
                }
                if (e.attackCooldown > 0) e.attackCooldown -= dt;
            });

            // ---- Camera ----
            const targetPos = playerGroup.position.clone();
            camPivot.position.lerp(targetPos, 1 - Math.exp(-8 * dt));
            const off = new THREE.Vector3(
                Math.sin(camTheta) * Math.cos(camPhi) * 5.5,
                Math.sin(camPhi) * 5.5 + 1.5,
                Math.cos(camTheta) * Math.cos(camPhi) * 5.5
            );
            const desired = camPivot.position.clone().add(off);
            camera.position.lerp(desired, 1 - Math.exp(-10 * dt));
            camera.lookAt(camPivot.position.clone().add(new THREE.Vector3(0, 1.2, 0)));

            // ---- VFX update ----
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.timer += dt;
                if (p.timer > p.maxLife) {
                    scene.remove(p.mesh);
                    if (p.mesh.geometry) p.mesh.geometry.dispose();
                    particles.splice(i, 1);
                    continue;
                }
                const prog = p.timer / p.maxLife;
                if (p.mesh.isPoints) {
                    const pos = p.mesh.geometry.attributes.position;
                    for (let j = 0; j < p.vel.length; j++) {
                        pos.array[j * 3] += p.vel[j].x * dt;
                        pos.array[j * 3 + 1] += p.vel[j].y * dt;
                        pos.array[j * 3 + 2] += p.vel[j].z * dt;
                        p.vel[j].multiplyScalar(0.98);
                    }
                    pos.needsUpdate = true;
                    p.mesh.material.opacity = 1 - prog;
                } else if (p.isTrail) {
                    p.mesh.material.opacity = 1 - prog;
                    p.mesh.scale.setScalar(1 + prog * 2);
                } else {
                    p.mesh.material.opacity = 1 - prog;
                    p.mesh.scale.setScalar(1 + prog);
                }
            }

            // ---- Enemy flash ----
            enemies.forEach(e => {
                if (e.isDead) return;
                e.mesh.children.forEach(child => {
                    if (child.isMesh && child.material) {
                        child.material.emissiveIntensity = e.hitFlash > 0 ? 1.5 : (e.isBoss && e.phase === 2 ?
                            0.8 : 0.15);
                    }
                });
            });

            // ---- UI ----
            renderUI();

            // ---- Save periodically ----
            if (Math.floor(time) % 10 === 0 && time > 0) saveGame();

            // ---- Render ----
            composer.render();
        }

        // =======================================================================
        //  START
        // =======================================================================
        loadGame();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Touch to init audio
        document.addEventListener('touchstart', initAudio, { once: true });
        console.log('🔥 Anime RPG Deluxe loaded! Press Tab for skills, I for inventory, Q for quests.');
    </script>
</body>
</html>
